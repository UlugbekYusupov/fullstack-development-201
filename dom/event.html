<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
        }
        .container {
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }
        .form {
            width: 360px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow:0 5px 15px rgb(0,0,0,0.1);
        }
        input {
            box-sizing: border-box;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .login-btn {
            margin-top: 10px;
            background-color: white;
            border-radius: 5px;
            border: 2px solid blue;
            padding: 10px;
            width: 100%;
        }

        span {
            color: blue;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
        <div class="container">
            <!-- sign up -->
             <div class="form" id="signupForm"> 
                <h2>Sign Up</h2>
                <input type="text" placeholder="Username">
                <input type="email" placeholder="email">
                <input type="password" placeholder="password">
                <button class="btn">Submit</button>
                <p>Already hava an account? <span id="gologin">login</span></p>
             </div>

             <!-- login -->
              <div class="form hidden " id="loginForm">
                <h2>Login</h2>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="password">
                <button class="btn">Submit</button>
                <button class="login-btn">Don't hava an account?<span id="gosignup">Sign Up</span></button>
              </div>
        </div>
        <script src="./event.js"></script>
</body>
</html>
