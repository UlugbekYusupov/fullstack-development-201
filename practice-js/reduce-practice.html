<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reduce</title>
</head>

<body>

    <script src="https://cdn.jsdelivr.net/gh/Abbosjondev/instant-console/console.js"></script>

    <script>

        const sonlar = [5, 10, 2];

        let sum = sonlar.reduce((savat, mahsulot) => {
            return savat + mahsulot;
        }, 0)

        let katta = sonlar.reduce((engKatta, son) => {
            return engKatta < son ? son : engKatta
        }, 0)

        console.log(katta)


        const mevalar = ["olma", "banan", "olma", "apelsin", "banan", "olma"];

        const hisobot = mevalar.reduce((obj, meva) => {
            if (!obj[meva]) {
                obj[meva] = 1;
            } else {
                obj[meva]++;
            }
            return obj;
        }, {});

        console.log(hisobot);

    </script>
</body>

</html>
