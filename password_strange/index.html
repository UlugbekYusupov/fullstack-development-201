<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password checker</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            width: 340px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgb(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            border-radius: 5px;
            padding: 10px;
            border: 2px solid #ddd;
            outline: none;
            margin-bottom: 20px;
        }
        .strength {
            margin-top: 15px;
            padding: 8px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            display: none;
        }
        .weak {
            background-color: red;
        }
        .medium {
            background-color: orange;
        }
        .strong {
            background-color: green;
        }

    </style>
</head>
<body>
        <div class="container">
            <h2>Password strength checker </h2>
            <input type="password" id="password" placeholder="Enter password" oninput="Checker()">
            <div class="strength" id="strength"></div>
        </div>
        <script src="./app.js"></script>
</body>
</html>
