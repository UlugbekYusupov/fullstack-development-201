<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="calculator">
        <input type="text" id="display" disabled />

        <div class="keys">
          <button class="btn-orange" onclick="clearDisplay()">C</button>
          <button class="btn-orange" onclick="deleteLast()">DEL</button>
          <button class="btn-orange" onclick="appendChar('%')">%</button>
          <button class="btn-orange" onclick="appendChar('/')">÷</button>

          <button onclick="appendChar('7')">7</button>
          <button onclick="appendChar('8')">8</button>
          <button onclick="appendChar('9')">9</button>
          <button class="btn-orange" onclick="appendChar('*')">×</button>

          <button onclick="appendChar('4')">4</button>
          <button onclick="appendChar('5')">5</button>
          <button onclick="appendChar('6')">6</button>
          <button class="btn-orange" onclick="appendChar('-')">-</button>

          <button onclick="appendChar('1')">1</button>
          <button onclick="appendChar('2')">2</button>
          <button onclick="appendChar('3')">3</button>
          <button class="btn-orange" onclick="appendChar('+')">+</button>

          <button class="btn-zero" onclick="appendChar('0')">0</button>
          <button onclick="appendChar('.')">.</button>
          <button class="btn-green" onclick="calculate()">=</button>
        </div>
      </div>

      <div class="traffic-light-box">
        <div class="traffic-light">
          <div class="circle" id="red"></div>
          <div class="circle" id="yellow"></div>
          <div class="circle" id="green"></div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
