    <script>
 // Lecture-3   challenge-3         
    function reverseNumber(num) {
    let startDigit = 0;
    let isNegative = num < 0;
    
    // Agar son manfiy bo'lsa, uni vaqtincha musbatga aylantiramiz
    if (isNegative) {
        num = num * -1;
    }

    // Raqamlarni teskari qilish jarayoni
    while (num > 0) {
        let lastDigit = num % 10;      // Oxirgi raqamni olish
        if(startDigit<lastDigit){
            startDigit = lastDigit
        };
        num = Math.floor(num / 10);    // Oxirgi raqamni o'chirish
    }

    // Agar son manfiy bo'lgan bo'lsa, manfiylikni qaytaramiz
    if (isNegative) {
        return startDigit * -1;
    }

    return startDigit;
}


console.log(reverseNumber(123459)); 
console.log(reverseNumber(187));  
console.log(reverseNumber(-561)); 

// Lecture-3   challenge-4
function sumNumbers(num) {
    let startDigit = 0;
    let isNegative = num < 0;
    
    // Agar son manfiy bo'lsa, uni vaqtincha musbatga aylantiramiz
    if (isNegative) {
        num = num * -1;
    }

    // Raqamlarni teskari qilish jarayoni
    while (num > 0) {
        let lastDigit = num % 10;      // Oxirgi raqamni olish
        startDigit += lastDigit;
        num = Math.floor(num / 10);    // Oxirgi raqamni o'chirish
    }

    // Agar son manfiy bo'lgan bo'lsa, manfiylikni qaytaramiz
    if (isNegative) {
        return startDigit * -1;
    }

    return startDigit;
}
    
console.log(sumNumbers(-561));
console.log(sumNumbers(123));
console.log(sumNumbers(888977));  

// Lecture-3   challenge-5
function countNumbers(num) {
    let startDigit = 0;
    let isNegative = num < 0;
    
    // Agar son manfiy bo'lsa, uni vaqtincha musbatga aylantiramiz
    if (isNegative) {
        num = num * -1;
    }

    // Raqamlarni teskari qilish jarayoni
    while (num > 0) {
        let lastDigit = num % 10;      // Oxirgi raqamni olish
        startDigit++;
        num = Math.floor(num / 10);    // Oxirgi raqamni o'chirish
    }

    // Agar son manfiy bo'lgan bo'lsa, manfiylikni qaytaramiz
    

    return startDigit;
}
    
console.log(countNumbers(-561));
console.log(countNumbers(123));
console.log(countNumbers(888977));
