    <ul id="meva-royxat">
        <li>Olma</li>
        <li>Nok</li>
        <li>Gilos</li>
    </ul>

    <script>
        let royxat = document.getElementById("meva-royxat");

        royxat.addEventListener("click", function (e) {
            if (e.target.tagName === "LI") {
                alert("Siz tanlagan meva: " + e.target.textContent);
            }
        });
    </script>
