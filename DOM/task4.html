<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task4</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .traffic-box {
            background: black;
            padding: 25px;
            border-radius: 20px;
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .light {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: gray;
        }

        .red.active {
            background: red;
        }

        .yellow.active {
            background: yellow;
        }

        .green.active {
            background: green;
        }
    </style>
</head>

<body>

    <div class="traffic-box">
        <div class="light red active"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>

    <script>
        let currentIDX = 0;
        function updateLight() {
            const light = document.querySelectorAll('.light');

            light[currentIDX].classList.remove('active')

            if(currentIDX >= 2) currentIDX = -1;

            light[currentIDX + 1].classList.add('active')

            if (currentIDX <= 3) currentIDX++;
        }

        setInterval(() => {
            updateLight()
        }, 1500);

    </script>

</body>

</html>
