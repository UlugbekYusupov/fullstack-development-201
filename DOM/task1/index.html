<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>


    <div class="container">
        <h2>Interactive To-Do List</h2>
        <div id="taskList">
            <div class="task">
                <div>
                    <h3>Task 1</h3>
                    <p>Description for Task 1</p>
                    <button class="delete">Delete</button>
                </div>
                <span class="status pending">Pending</span>
            </div>
            <div class="task">
                <div>
                    <h3>Task 2</h3>
                    <p>Description for Task 2</p>
                    <button class="delete">Delete</button>
                </div>
                <span class="status progress">In Progress</span>
            </div>
            <div class="task">
                <div>
                    <h3>Task 3</h3>
                    <p>Description for Task 3</p>
                    <button class="delete">Delete</button>
                </div>
                <span class="status completed">Completed</span>
            </div>
        </div>
        <button id="addBtn">Add Task</button>
    </div>


    <div id="modal">
        <div class="modal-content">
            <h3>Add Task</h3>
            <input id="title" type="text" placeholder="Task Title">
            <textarea id="desc" placeholder="Task Description"></textarea>
            <select id="status">
                <option value="pending">Pending</option>
                <option value="progress">In Progress</option>
                <option value="completed">Completed</option>
            </select>
            <button id="save">Save Task</button>
            <button id="close">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
