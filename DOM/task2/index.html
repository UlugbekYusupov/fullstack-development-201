<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Task2</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        .strength {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            color: white;
            display: inline-block;
            min-width: 100px;
        }

        .weak {
            background: #e53935;
        }

        .medium {
            background: #f9a825;
        }

        .strong {
            background: #2e7d32;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Password Strength Checker</h2>

        <input type="password" id="password" placeholder="Enter password" autocomplete="off" oninput="checkStrength()" />

        <div id="result"></div>

    </div>

    <script>

        function checkStrength() {

            let password = document.getElementById("password").value
            let result = document.getElementById("result")

            let score = 0

            if (password.length >= 8) { score++ }

            if (/[A-Z]/.test(password)) { score++ }

            if (/[0-9]/.test(password)) { score++ }

            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) { score++ }


            if (password.length === 0) {
                result.innerHTML = ""
                return
            }

            if (score <= 1) {
                result.innerHTML = '<div class="strength weak">Weak</div>'
            } else if (score == 2 || score == 3) {
                result.innerHTML = '<div class="strength medium">Medium</div>'
            } else {
                result.innerHTML = '<div class="strength strong">Strong</div>'
            }
        }

    </script>

</body>

</html>
